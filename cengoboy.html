"use strict";

// === GB Constants ===
const IW=160, IH=144;
const SC=4; // preview scale
const EX_SC=5; // export scale → 800×720
const DMG_PAL=[[157,169,0],[106,159,68],[53,114,81],[25,77,51]];
const BAYER=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]].map(r=>r.map(v=>(v/16)-0.5));

// Chassis image: 1206×917, LCD area at (203, 109), 800×720
const CHASSIS_W=1206, CHASSIS_H=917, LCD_X=203, LCD_Y=109;

// === Quantize to 4-color GB palette ===
function quantize(img,pal,inv,contrast){
  const d=img.data,w=img.width;
  const p0=inv?0:3, p1=inv?1:2, p2=inv?2:1, p3=inv?3:0;
  const c=contrast!=null?contrast:0.5;
  const gain=0.2+c*2.8;
  for(let i=0;i<d.length;i+=4){
    let k=d[i]/255;
    k=0.5+(k-0.5)*gain;
    const py=Math.floor(i/4/w),px=(i/4)%w;
    k+=BAYER[py%4][px%4]*0.22;
    k=Math.max(0,Math.min(1,k));
    const idx=k<0.125?p0:k<0.375?p1:k<0.625?p2:p3;
    d[i]=pal[idx][0];d[i+1]=pal[idx][1];d[i+2]=pal[idx][2];d[i+3]=255;
  }
}

// === Dead Pixels ===
function applyDeadPixels(imgData,deadCols,pal,w,h){
  if(!deadCols||!deadCols.length)return;
  const od=imgData.data,bg=pal[0];
  for(const dx of deadCols){
    if(dx>=0&&dx<w)for(let dy=0;dy<h;dy++){
      const off=(dy*w+dx)*4;
      od[off]=bg[0];od[off+1]=bg[1];od[off+2]=bg[2];
    }
  }
}

// === Upscale with optional real-mode grid ===
function upscale(srcData,dstImg,srcW,srcH,dstW,dstH,sc,pal,realMode){
  const dst=dstImg.data;
  const gR=pal[0][0],gG=pal[0][1],gB=pal[0][2];
  for(let dy=0;dy<dstH;dy++){
    const sy=Math.floor(dy/sc);
    const isGridY=realMode&&(dy%sc===sc-1);
    for(let dx=0;dx<dstW;dx++){
      const sx=Math.floor(dx/sc);
      const si=(sy*srcW+sx)*4,di=(dy*dstW+dx)*4;
      if(isGridY||(realMode&&(dx%sc===sc-1))){
        dst[di]=gR;dst[di+1]=gG;dst[di+2]=gB;dst[di+3]=255;
      }else{
        dst[di]=srcData[si];dst[di+1]=srcData[si+1];dst[di+2]=srcData[si+2];dst[di+3]=255;
      }
    }
  }
}

    _lut={aE,tR,tG,tB,tA};
  }

  function getPalInv(pal){
    const k=pal[0].join(",")+"|"+pal[3].join(",");
    if(_palInvSrc===k)return _palInvMap;
    const m=new Map();
    m.set(pal[0].join(","),pal[3]);
    m.set(pal[3].join(","),pal[0]);
    m.set(pal[1].join(","),pal[2]);
    m.set(pal[2].join(","),pal[1]);
    _palInvMap=m;_palInvSrc=k;
    return m;
  }

  function apply(imgData,severity,oW,oH,deadCols,pal,texMul){
    if(severity<=0||!_ready||!_lut)return;
    const dst=imgData.data,sev=severity;
    const tm=(texMul!==undefined)?texMul:1; // texture opacity multiplier
    const palInv=getPalInv(pal);
    const p0r=pal[0][0],p0g=pal[0][1],p0b=pal[0][2];
    const deadSet=new Set(deadCols||[]);
    const hasDead=deadSet.size>0;
    const LW=160,LH=144;
    const native=(oW===LW&&oH===LH);
    for(let y=0;y<oH;y++){
      const ly=native?y:Math.floor(y*LH/oH);
      for(let x=0;x<oW;x++){
        const lx=native?x:Math.floor(x*LW/oW);
        const li=ly*LW+lx;
        const ae=_lut.aE[li],eA=_lut.tA[li]/255;
        if(ae<3&&eA<0.01)continue;
        const aEf=ae/255;
        const eR=_lut.tR[li],eG=_lut.tG[li],eB=_lut.tB[li];
        const di=(y*oW+x)<<2;
        const r=dst[di],g=dst[di+1],b=dst[di+2];
        if(hasDead&&deadSet.has(lx)){
          const top=sev*eA*tm;
          if(top>0.001){const btm=1-top;dst[di]=(eR*top+r*btm+0.5)|0;dst[di+1]=(eG*top+g*btm+0.5)|0;dst[di+2]=(eB*top+b*btm+0.5)|0;}
          continue;
        }
        let ir=r,ig=g,ib=b;
        const localInv=Math.min(1,sev)*aEf;
        if(localInv>0.001){
          const inv=palInv.get(r+","+g+","+b);
          if(inv){ir=r+(inv[0]-r)*localInv;ig=g+(inv[1]-g)*localInv;ib=b+(inv[2]-b)*localInv;}
        }
        const fadeProg=Math.min(1,sev)*aEf;
        let fr,fg,fb;
        if(fadeProg>=1){fr=p0r;fg=p0g;fb=p0b;}
        else{const rem=1-fadeProg;fr=ir*rem+p0r*fadeProg;fg=ig*rem+p0g*fadeProg;fb=ib*rem+p0b*fadeProg;}
        const top=sev*eA*tm;
        if(top>0.001){const btm=1-top;dst[di]=(eR*top+fr*btm+0.5)|0;dst[di+1]=(eG*top+fg*btm+0.5)|0;dst[di+2]=(eB*top+fb*btm+0.5)|0;}
        else{dst[di]=(fr+0.5)|0;dst[di+1]=(fg+0.5)|0;dst[di+2]=(fb+0.5)|0;}
      }
    }
  }

  function applyGrid(imgData,severity,oW,oH,sc){
    if(severity<=0||!_ready||!_lut)return;
    const dst=imgData.data;
    for(let dy=0;dy<oH;dy++){
      const isGridY=(dy%sc===sc-1);
      const ly=Math.floor(dy*144/oH);
      for(let dx=0;dx<oW;dx++){
        if(!isGridY&&(dx%sc!==sc-1))continue;
        const lx=Math.floor(dx*160/oW);
        const li=ly*160+lx;
        const eA=_lut.tA[li]/255;
        const top=severity*eA;
        if(top<0.001)continue;
        const di=(dy*oW+dx)<<2;
        const btm=1-top;
        dst[di]=(_lut.tR[li]*top+dst[di]*btm+0.5)|0;
        dst[di+1]=(_lut.tG[li]*top+dst[di+1]*btm+0.5)|0;
        dst[di+2]=(_lut.tB[li]*top+dst[di+2]*btm+0.5)|0;
      }
    }
  }

  preload();
  return {apply,applyGrid,isReady:()=>_ready};
})();

// Active palette (adjusted by GB contrast dial)

function updateGBContrast(){
  // GB LCD contrast dial — matches the visualizer's buildPal approach.
  // Works with both DMG and LIGHT palettes.
  const c=gbContrastLevel;
  const MASTER=lightMode?LIGHT_PAL:DMG_PAL;
  const lo=MASTER[0]; // brightest palette entry
  const hi=MASTER[3]; // darkest palette entry
  for(let i=0;i<4;i++){
    for(let j=0;j<3;j++){
      const base=MASTER[i][j];
      let v;
      if(c<=0.5){
        v=lo[j]+(base-lo[j])*(c/0.5);
      }else{
        v=base+(hi[j]-base)*((c-0.5)/0.5);
      }
      ACTIVE_PAL[i][j]=Math.round(Math.max(0,Math.min(255,v)));
    }
  }
}

// === DEAD PIXEL CONTROL ===
function updateDeadPixels(val){
  deadPixelLevel=val;
  let numDead;
  const t=val/100;
  if(t<=0.5){
    numDead=Math.round((t/0.5)*10);
  }else{
    const steep=(t-0.5)/0.5;
    numDead=Math.round(10+steep*steep*150);
  }
  numDead=Math.min(numDead,IW);
  while(deadCols.length<numDead){
    let col;
    do{ col=Math.floor(Math.random()*IW); }while(deadCols.includes(col));
    deadCols.push(col);
  }
  while(deadCols.length>numDead)deadCols.pop();
}

let audioCtx=null;
const audioBufs={};
function initAudio(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    // Decode all SE
    Object.keys(SE_DATA).forEach(key=>{
      const raw=atob(SE_DATA[key]);
      const arr=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
      audioCtx.decodeAudioData(arr.buffer.slice(0)).then(buf=>{audioBufs[key]=buf;});
    });
    // Warm up with silent play
    const g=audioCtx.createGain();g.gain.value=0;g.connect(audioCtx.destination);
    const osc=audioCtx.createOscillator();osc.connect(g);osc.start();osc.stop(audioCtx.currentTime+0.01);
  }catch(e){console.error("Audio init failed:",e);}
}
function playSE(key){
  if(!audioCtx||!audioBufs[key])return;
  if(audioCtx.state==="suspended")audioCtx.resume();
  const s=audioCtx.createBufferSource();
  s.buffer=audioBufs[key];
  s.connect(audioCtx.destination);
  s.start();
}
// Init audio on first user gesture
["touchstart","click","keydown"].forEach(ev=>{
  document.addEventListener(ev,function _initOnce(){initAudio();document.removeEventListener(ev,_initOnce);},{once:true});
});

// === CENGIZ ===
async function startCamera(){
  try{
    // Fully release previous stream before requesting new one
    if(cameraStream){
      cameraStream.getTracks().forEach(t=>t.stop());
      video.srcObject=null;
      cameraStream=null;
      // Small delay to let device release
      await new Promise(r=>setTimeout(r,200));
    }
    cameraStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facingMode},width:{ideal:640},height:{ideal:480}},audio:false
    });
    video.srcObject=cameraStream;
    await video.play();
    if(!animId)animId=requestAnimationFrame(renderLoop);
  }catch(e){
    console.error("Camera error:",e);
    const cv=document.getElementById("display");
    const ctx=cv.getContext("2d");
    ctx.fillStyle="#193326";
    ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle="#9DA900";
    ctx.font="bold 24px 'Misaki Gothic',monospace";
    ctx.textAlign="center";
    ctx.fillText("カメラが",cv.width/2,cv.height/2-30);
    ctx.fillText("つかえません",cv.width/2,cv.height/2+10);
    ctx.font="16px 'Misaki Gothic',monospace";
    ctx.fillText("CAMERA NOT AVAILABLE",cv.width/2,cv.height/2+50);
  }
}

function flipCamera(){
  facingMode=(facingMode==="environment")?"user":"environment";
  startCamera();
}

// === RENDER PIPELINE ===
function processFrame(srcCanvas,srcCtx,outCanvas,outCtx,sc,realMode){
  const sw=srcCanvas.width,sh=srcCanvas.height;
  const img=srcCtx.getImageData(0,0,sw,sh);
  const d=img.data;
  for(let i=0;i<d.length;i+=4){
    const gray=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
    d[i]=gray;d[i+1]=gray;d[i+2]=gray;
  }
  srcCtx.putImageData(img,0,0);
  const qImg=srcCtx.getImageData(0,0,IW,IH);
  quantize(qImg,ACTIVE_PAL,false,contrastLevel);
  applyDeadPixels(qImg,deadCols,ACTIVE_PAL,IW,IH);
  srcCtx.putImageData(qImg,0,0);
  if(vinegarSev>0){
    const vImg=srcCtx.getImageData(0,0,IW,IH);
    VinegarSyndrome.apply(vImg,vinegarSev,IW,IH,deadCols,ACTIVE_PAL,lightMode?0.5:1);
    srcCtx.putImageData(vImg,0,0);
  }
  const srcData=srcCtx.getImageData(0,0,IW,IH).data;
  const ow=IW*sc,oh=IH*sc;
  // Only resize canvas when dimensions actually change (avoids costly clear every frame)
  if(outCanvas.width!==ow)outCanvas.width=ow;
  if(outCanvas.height!==oh)outCanvas.height=oh;
  const dstImg=outCtx.createImageData(ow,oh);
  upscale(srcData,dstImg,IW,IH,ow,oh,sc,ACTIVE_PAL,realMode);
  if(realMode&&vinegarSev>0)VinegarSyndrome.applyGrid(dstImg,vinegarSev,ow,oh,sc);
  outCtx.putImageData(dstImg,0,0);
}

// === FPS THROTTLE (15fps for authentic GB camera feel) ===
const TARGET_FPS=15;
const FRAME_INTERVAL=1000/TARGET_FPS;
let lastFrameTime=0;

function renderLoop(now){
  animId=requestAnimationFrame(renderLoop);
  if(!video.videoWidth)return;
  // Throttle to TARGET_FPS
  if(now-lastFrameTime<FRAME_INTERVAL)return;
  lastFrameTime=now-(( now-lastFrameTime)%FRAME_INTERVAL);

  const vw=video.videoWidth,vh=video.videoHeight;
  const vAspect=vw/vh,gAspect=IW/IH;
  let sx=0,sy=0,sw=vw,sh=vh;
  if(vAspect>gAspect){sw=vh*gAspect;sx=(vw-sw)/2;}
  else{sh=vw/gAspect;sy=(vh-sh)/2;}
  if(facingMode==="user"){
    wCtx.save();wCtx.translate(IW,0);wCtx.scale(-1,1);
    wCtx.drawImage(video,sx,sy,sw,sh,0,0,IW,IH);
    wCtx.restore();
  }else{
    wCtx.drawImage(video,sx,sy,sw,sh,0,0,IW,IH);
  }
  processFrame(work,wCtx,display,dCtx,SC,false);
}

// === CAPTURE & IMMEDIATE SAVE ===
function captureAndSave(mode){
  const vw=video.videoWidth,vh=video.videoHeight;
  if(!vw)return;
  const vAspect=vw/vh,gAspect=IW/IH;
  let sx=0,sy=0,sw=vw,sh=vh;
  if(vAspect>gAspect){sw=vh*gAspect;sx=(vw-sw)/2;}
  else{sh=vw/gAspect;sy=(vh-sh)/2;}
  if(facingMode==="user"){
    wCtx.save();wCtx.translate(IW,0);wCtx.scale(-1,1);
    wCtx.drawImage(video,sx,sy,sw,sh,0,0,IW,IH);
    wCtx.restore();
  }else{
    wCtx.drawImage(video,sx,sy,sw,sh,0,0,IW,IH);
  }
  // Save raw grayscale
  const raw=wCtx.getImageData(0,0,IW,IH);
  const capturedGray=new Uint8Array(IW*IH);
  for(let i=0;i<IW*IH;i++){
    capturedGray[i]=Math.round(raw.data[i*4]*0.299+raw.data[i*4+1]*0.587+raw.data[i*4+2]*0.114);
  }
  // Rebuild from gray for clean quantization
  const img=wCtx.createImageData(IW,IH);
  for(let i=0;i<IW*IH;i++){
    const g=capturedGray[i];
    img.data[i*4]=g;img.data[i*4+1]=g;img.data[i*4+2]=g;img.data[i*4+3]=255;
  }
  wCtx.putImageData(img,0,0);
  const qImg=wCtx.getImageData(0,0,IW,IH);
  quantize(qImg,ACTIVE_PAL,false,contrastLevel);
  applyDeadPixels(qImg,deadCols,ACTIVE_PAL,IW,IH);
  wCtx.putImageData(qImg,0,0);
  if(vinegarSev>0){
    const vImg=wCtx.getImageData(0,0,IW,IH);
    VinegarSyndrome.apply(vImg,vinegarSev,IW,IH,deadCols,ACTIVE_PAL,lightMode?0.5:1);
    wCtx.putImageData(vImg,0,0);
  }
  const srcData=wCtx.getImageData(0,0,IW,IH).data;
  const gbW=IW*EX_SC, gbH=IH*EX_SC;

  if(mode==="dx"){
    // === MYSTERY: 1240x1240 square export with full UI frame ===
    const gbCanvas=document.createElement("canvas");
    gbCanvas.width=gbW; gbCanvas.height=gbH;
    const gbCtx=gbCanvas.getContext("2d");
    const dstImg=gbCtx.createImageData(gbW,gbH);
    upscale(srcData,dstImg,IW,IH,gbW,gbH,EX_SC,ACTIVE_PAL,true);
    if(vinegarSev>0)VinegarSyndrome.applyGrid(dstImg,vinegarSev,gbW,gbH,EX_SC);
    gbCtx.putImageData(dstImg,0,0);
    const SQ=1240;
    const sqCanvas=document.createElement("canvas");
    sqCanvas.width=SQ; sqCanvas.height=SQ;
    const sq=sqCanvas.getContext("2d");
    // Compute yellowing for export
    const ed=deadPixelLevel/100, ev=vinegarLevel/100;
    const emR=(1-ed+ed*YELLOW_R)*(1-ev+ev*YELLOW_R);
    const emG=(1-ed+ed*YELLOW_G)*(1-ev+ev*YELLOW_G);
    const emB=(1-ed+ed*YELLOW_B)*(1-ev+ev*YELLOW_B);
    // Pick base colors for export matching current mode
    const expBg=lightMode?LIGHT_BASE_BG:BASE_BG;
    const expTrk=lightMode?LIGHT_BASE_TRACK:BASE_TRACK;
    const ebR=Math.round(expBg[0]*emR), ebG=Math.round(expBg[1]*emG), ebB=Math.round(expBg[2]*emB);
    const etR=Math.round(expTrk[0]*emR), etG=Math.round(expTrk[1]*emG), etB=Math.round(expTrk[2]*emB);
    sq.fillStyle=`rgb(${ebR},${ebG},${ebB})`;
    sq.fillRect(0,0,SQ,SQ);
    const lineY=44, lineH=18;
    sq.fillStyle=`rgb(${etR},${etG},${etB})`;
    sq.fillRect(0,lineY,SQ,lineH);
    const chX=Math.round((SQ-CHASSIS_W)/2);
    const chY=lineY+lineH+68;
    if(chassisLoaded){
      if(lightMode){
        // Use LIGHT chassis plate, darkened via pixel manipulation
        const srcImg=lightChassisLoaded?lightChassisEl:chassisImgEl;
        const tmpC=document.createElement("canvas");
        tmpC.width=CHASSIS_W;tmpC.height=CHASSIS_H;
        const tmpX=tmpC.getContext("2d");
        tmpX.drawImage(srcImg,0,0);
        const pxd=tmpX.getImageData(0,0,CHASSIS_W,CHASSIS_H);
        const pd=pxd.data;
        for(let i=0;i<pd.length;i+=4){pd[i]=pd[i]*0.15|0;pd[i+1]=pd[i+1]*0.15|0;pd[i+2]=pd[i+2]*0.15|0;}
        tmpX.putImageData(pxd,0,0);
        sq.drawImage(tmpC,chX,chY);
      }else{
        sq.drawImage(chassisImgEl,chX,chY);
      }
    }
    // Yellow overlay on chassis (multiply blend)
    const eavg=(emR+emG+emB)/3;
    if(eavg<0.999){
      sq.save();
      sq.globalCompositeOperation="multiply";
      sq.globalAlpha=1-eavg;
      sq.fillStyle="#ffcd56";
      sq.fillRect(chX,chY,CHASSIS_W,CHASSIS_H);
      sq.restore();
    }
    // LIGHT mode: battery LED overlay on darkened chassis
    if(lightMode&&lightOvlLoaded){
      sq.drawImage(lightOvlEl,chX,chY,CHASSIS_W,CHASSIS_H);
    }
    // LIGHT mode: LCD glow — same passes repeated 3x for thickness (like increasing opacity/spread softly)
    if(lightMode){
      const lx=chX+LCD_X, ly=chY+LCD_Y;
      for(let rep=0;rep<2;rep++){
        sq.save();sq.shadowColor="rgba(0,181,129,0.3)";sq.shadowBlur=200;
        sq.drawImage(gbCanvas,lx,ly);sq.restore();
        sq.save();sq.shadowColor="rgba(0,181,129,0.4)";sq.shadowBlur=100;
        sq.drawImage(gbCanvas,lx,ly);sq.restore();
        sq.save();sq.shadowColor="rgba(0,181,129,0.5)";sq.shadowBlur=50;
        sq.drawImage(gbCanvas,lx,ly);sq.restore();
        sq.save();sq.shadowColor="rgba(0,181,129,0.6)";sq.shadowBlur=20;
        sq.drawImage(gbCanvas,lx,ly);sq.restore();
      }
      // Final crisp pixels on top
      sq.drawImage(gbCanvas,lx,ly);
    }else{
      sq.drawImage(gbCanvas,chX+LCD_X,chY+LCD_Y);
    }
    if(glareLoaded){
      if(lightMode){
        // Barely visible glare in dark mode
        sq.save();sq.globalAlpha=0;sq.drawImage(glareImgEl,chX,chY,CHASSIS_W,CHASSIS_H);sq.restore();
      }else{
        sq.drawImage(glareImgEl,chX,chY,CHASSIS_W,CHASSIS_H);
      }
    }
    // Draw scratches on DX export (above glare, clipped to plate shape)
    if(scratches.length>0&&chassisMaskCanvas){
      const scrTmp=document.createElement("canvas");
      scrTmp.width=CHASSIS_W;scrTmp.height=CHASSIS_H;
      const scrTmpCtx=scrTmp.getContext("2d");
      const lw3=3;
      function _dxScratch(ctx,s){
        ctx.beginPath();
        ctx.moveTo(s.points[0].x,s.points[0].y);
        for(let i=1;i<s.points.length;i++) ctx.lineTo(s.points[i].x,s.points[i].y);
        ctx.stroke();
      }
      if(!lightMode){
        scrTmpCtx.strokeStyle="rgba(255,255,255,0.12)";
        scrTmpCtx.lineWidth=lw3;scrTmpCtx.lineCap="round";scrTmpCtx.lineJoin="round";
        for(const s of scratches) _dxScratch(scrTmpCtx,s);
      }else{
        const elx=LCD_X,ely=LCD_Y,elw=IW*EX_SC,elh=IH*EX_SC;
        scrTmpCtx.save();
        scrTmpCtx.beginPath();scrTmpCtx.rect(0,0,CHASSIS_W,CHASSIS_H);scrTmpCtx.rect(elx,ely,elw,elh);scrTmpCtx.clip("evenodd");
        scrTmpCtx.strokeStyle="rgba(255,255,255,0.04)";scrTmpCtx.lineWidth=lw3;scrTmpCtx.lineCap="round";scrTmpCtx.lineJoin="round";
        for(const s of scratches) _dxScratch(scrTmpCtx,s);
        scrTmpCtx.restore();
        scrTmpCtx.save();
        scrTmpCtx.beginPath();scrTmpCtx.rect(elx,ely,elw,elh);scrTmpCtx.clip();
        scrTmpCtx.strokeStyle="rgba(255,255,255,0.01)";scrTmpCtx.lineWidth=lw3;scrTmpCtx.lineCap="round";scrTmpCtx.lineJoin="round";
        for(const s of scratches) _dxScratch(scrTmpCtx,s);
        scrTmpCtx.restore();
      }
      scrTmpCtx.globalCompositeOperation="destination-in";
      scrTmpCtx.drawImage(chassisMaskCanvas,0,0);
      sq.drawImage(scrTmp,chX,chY);
    }
    if(logoImgEl.complete&&logoImgEl.naturalWidth){
      const logoH=76;
      const logoW=Math.round(logoImgEl.naturalWidth*(logoH/logoImgEl.naturalHeight));
      const logoY=chY+CHASSIS_H+15;
      if(lightMode){
        const tmpL=document.createElement("canvas");
        tmpL.width=logoW;tmpL.height=logoH;
        const tmpLx=tmpL.getContext("2d");
        tmpLx.drawImage(logoImgEl,0,0,logoW,logoH);
        const lpx=tmpLx.getImageData(0,0,logoW,logoH);
        const ld=lpx.data;
        for(let i=0;i<ld.length;i+=4){ld[i]=ld[i]*0.15|0;ld[i+1]=ld[i+1]*0.15|0;ld[i+2]=ld[i+2]*0.15|0;}
        tmpLx.putImageData(lpx,0,0);
        sq.drawImage(tmpL,chX,logoY);
      }else{
        sq.drawImage(logoImgEl,chX,logoY,logoW,logoH);
      }
    }
    const link=document.createElement("a");
    link.download="gb_camera_"+Date.now()+"_dx.png";
    link.href=sqCanvas.toDataURL("image/png");
    link.click();
  }else if(mode==="real"){
    // === REAL: GB screen with grid (dot boundaries), same size as DX's LCD area (800×720) ===
    exportC.width=gbW; exportC.height=gbH;
    const dstImg=eCtx.createImageData(gbW,gbH);
    upscale(srcData,dstImg,IW,IH,gbW,gbH,EX_SC,ACTIVE_PAL,true);
    if(vinegarSev>0)VinegarSyndrome.applyGrid(dstImg,vinegarSev,gbW,gbH,EX_SC);
    eCtx.putImageData(dstImg,0,0);
    const link=document.createElement("a");
    link.download="gb_camera_"+Date.now()+"_real.png";
    link.href=exportC.toDataURL("image/png");
    link.click();
  }else{
    // === NORMAL: Pure GB screen only 800×720, no grid, no chassis, no glare ===
    exportC.width=gbW; exportC.height=gbH;
    const dstImg=eCtx.createImageData(gbW,gbH);
    upscale(srcData,dstImg,IW,IH,gbW,gbH,EX_SC,ACTIVE_PAL,false);
    eCtx.putImageData(dstImg,0,0);
    const link=document.createElement("a");
    link.download="gb_camera_"+Date.now()+".png";
    link.href=exportC.toDataURL("image/png");
    link.click();
  }
}

// === CHASSIS SCRATCHES (fast swipe on plate) ===
const scratches=[]; // [{x1,y1,x2,y2}] in CHASSIS_W x CHASSIS_H coords
let chassisAlpha=null; // Uint8Array for alpha hit-test
const scratchOvl=document.getElementById("scratchOverlay");
scratchOvl.width=CHASSIS_W; scratchOvl.height=CHASSIS_H;
const scratchCtx=scratchOvl.getContext("2d");

// Build alpha map + mask canvas from chassis image once loaded
let chassisMaskCanvas=null;
function buildChassisAlpha(){
  const tc=document.createElement("canvas");
  tc.width=CHASSIS_W;tc.height=CHASSIS_H;
  const tx=tc.getContext("2d");
  tx.drawImage(chassisImgEl,0,0,CHASSIS_W,CHASSIS_H);
  const d=tx.getImageData(0,0,CHASSIS_W,CHASSIS_H).data;
  chassisAlpha=new Uint8Array(CHASSIS_W*CHASSIS_H);
  for(let i=0;i<chassisAlpha.length;i++) chassisAlpha[i]=d[i*4+3];
  // Create mask canvas: white where alpha>0, transparent elsewhere
  chassisMaskCanvas=document.createElement("canvas");
  chassisMaskCanvas.width=CHASSIS_W;chassisMaskCanvas.height=CHASSIS_H;
  const mx=chassisMaskCanvas.getContext("2d");
  const mImg=mx.createImageData(CHASSIS_W,CHASSIS_H);
  for(let i=0;i<chassisAlpha.length;i++){
    mImg.data[i*4]=255;mImg.data[i*4+1]=255;mImg.data[i*4+2]=255;
    mImg.data[i*4+3]=chassisAlpha[i]>0?255:0;
  }
  mx.putImageData(mImg,0,0);
}
// Hook into chassis load
const _origChassisOnload=chassisImgEl.onload;
chassisImgEl.onload=function(){
  if(_origChassisOnload)_origChassisOnload.call(this);
  buildChassisAlpha();
};
if(chassisLoaded)buildChassisAlpha(); // already loaded

function isOnPlate(cx,cy){
  if(!chassisAlpha)return false;
  const ix=Math.round(cx),iy=Math.round(cy);
  if(ix<0||ix>=CHASSIS_W||iy<0||iy>=CHASSIS_H)return false;
  return chassisAlpha[iy*CHASSIS_W+ix]>0;
}

function screenToChassis(clientX,clientY){
  const wrap=document.getElementById("chassisWrap");
  const rect=wrap.getBoundingClientRect();
  return{
    x:(clientX-rect.left)/rect.width*CHASSIS_W,
    y:(clientY-rect.top)/rect.height*CHASSIS_H
  };
}

function _drawScratchPath(ctx,s){
  ctx.beginPath();
  ctx.moveTo(s.points[0].x,s.points[0].y);
  for(let i=1;i<s.points.length;i++) ctx.lineTo(s.points[i].x,s.points[i].y);
  ctx.stroke();
}

function drawAllScratches(){
  scratchCtx.clearRect(0,0,CHASSIS_W,CHASSIS_H);
  if(scratches.length===0)return;
  if(!lightMode){
    // Normal mode: 12% everywhere
    scratchCtx.save();
    scratchCtx.strokeStyle="rgba(255,255,255,0.12)";
    scratchCtx.lineWidth=2;
    scratchCtx.lineCap="round";
    scratchCtx.lineJoin="round";
    for(const s of scratches) _drawScratchPath(scratchCtx,s);
    scratchCtx.restore();
  }else{
    const lx=LCD_X, ly=LCD_Y, lw=IW*EX_SC, lh=IH*EX_SC;
    // LIGHT pass 1: outside LCD — 4%
    scratchCtx.save();
    scratchCtx.beginPath();
    scratchCtx.rect(0,0,CHASSIS_W,CHASSIS_H);
    scratchCtx.rect(lx,ly,lw,lh);
    scratchCtx.clip("evenodd");
    scratchCtx.strokeStyle="rgba(255,255,255,0.04)";
    scratchCtx.lineWidth=2;
    scratchCtx.lineCap="round";
    scratchCtx.lineJoin="round";
    for(const s of scratches) _drawScratchPath(scratchCtx,s);
    scratchCtx.restore();
    // LIGHT pass 2: inside LCD — 1%
    scratchCtx.save();
    scratchCtx.beginPath();
    scratchCtx.rect(lx,ly,lw,lh);
    scratchCtx.clip();
    scratchCtx.strokeStyle="rgba(255,255,255,0.01)";
    scratchCtx.lineWidth=2;
    scratchCtx.lineCap="round";
    scratchCtx.lineJoin="round";
    for(const s of scratches) _drawScratchPath(scratchCtx,s);
    scratchCtx.restore();
  }
  // Clip to chassis plate shape
  if(chassisMaskCanvas){
    scratchCtx.globalCompositeOperation="destination-in";
    scratchCtx.drawImage(chassisMaskCanvas,0,0);
    scratchCtx.globalCompositeOperation="source-over";
  }
}

function tryFinishScratch(points,startTime){
  if(points.length<2)return;
  const dt=performance.now()-startTime;
  const first=points[0],last=points[points.length-1];
  const dx=last.cx-first.cx, dy=last.cy-first.cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const speed=dist/(dt||1);
  if(speed<0.8||dist<20)return; // too slow or short
  // Convert all screen points to chassis coords
  const pts=points.map(p=>screenToChassis(p.cx,p.cy));
  // Check if any point is on plate
  if(!pts.some(p=>isOnPlate(p.x,p.y)))return;
  scratches.push({points:pts});
  drawAllScratches();
}

// === KONAMI CODE (SWIPE + KEYBOARD) ===
const KONAMI_SEQ=["up","up","down","down","left","right","left","right"];
let konamiPos=0;
let swipeStart=null;

function konamiCheck(dir){
  if(dir===KONAMI_SEQ[konamiPos]){
    konamiPos++;
    playSE("comando"); // correct input beep
    if(konamiPos>=KONAMI_SEQ.length){
      konamiPos=0;
      playSE("konami_done"); // success fanfare
      lightMode=!lightMode;
      scratches.length=0; // reset scratches
      drawAllScratches(); // clear overlay
      updateGBContrast();
      updateVinegar(vinegarLevel);
      applyLightMode();
      updateYellowing();
    }
  }else{
    konamiPos=(dir===KONAMI_SEQ[0])?1:0;
    if(konamiPos===1)playSE("comando"); // first correct input
  }
}

// Swipe input
document.addEventListener("touchstart",e=>{
  if(e.touches.length===1)swipeStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:true});

document.addEventListener("touchend",e=>{
  if(!swipeStart)return;
  const end={x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  const dx=end.x-swipeStart.x, dy=end.y-swipeStart.y;
  const absDx=Math.abs(dx),absDy=Math.abs(dy);
  swipeStart=null;
  if(Math.max(absDx,absDy)<30)return;
  let dir;
  if(absDx>absDy)dir=dx>0?"right":"left";
  else dir=dy>0?"down":"up";
  konamiCheck(dir);
},{passive:true});

// Keyboard arrow keys (for debug / desktop)
const ARROW_MAP={"ArrowUp":"up","ArrowDown":"down","ArrowLeft":"left","ArrowRight":"right"};
document.addEventListener("keydown",e=>{
  const dir=ARROW_MAP[e.key];
  if(dir)konamiCheck(dir);
});

// === YELLOWING SYSTEM ===
// #ffcd56 multiply on chassis, top-line, slider tracks
// Each slider (dead/vinegar) contributes independently, stacking multiplicatively
const YELLOW_R=0xFF/255, YELLOW_G=0xCD/255, YELLOW_B=0x56/255;
const BASE_TRACK=[0x6C,0x69,0x72]; // #6C6972
const BASE_LINE=[0x6C,0x69,0x72];  // #6C6972
const BASE_BG=[0xC0,0xBF,0xBB];    // #C0BFBB
// LIGHT mode darkened base colors — #e4e4e4 body * LIGHT_DIM
const LIGHT_BASE_BG=[Math.round(0xe4*0.15),Math.round(0xe4*0.15),Math.round(0xe4*0.15)];
const LIGHT_BASE_TRACK=[Math.round(0x6C*0.15),Math.round(0x69*0.15),Math.round(0x72*0.15)];

function updateYellowing(){
  const d=deadPixelLevel/100;  // 0-1
  const v=vinegarLevel/100;    // 0-1
  const mR=(1-d+d*YELLOW_R)*(1-v+v*YELLOW_R);
  const mG=(1-d+d*YELLOW_G)*(1-v+v*YELLOW_G);
  const mB=(1-d+d*YELLOW_B)*(1-v+v*YELLOW_B);
  // Chassis overlay
  const avg=(mR+mG+mB)/3;
  document.getElementById("yellowOverlay").style.opacity=1-avg;
  // Pick base colors depending on mode
  const baseTrk=lightMode?LIGHT_BASE_TRACK:BASE_TRACK;
  const baseBg=lightMode?LIGHT_BASE_BG:BASE_BG;
  // Track & line color
  const tR=Math.round(baseTrk[0]*mR);
  const tG=Math.round(baseTrk[1]*mG);
  const tB=Math.round(baseTrk[2]*mB);
  const trackCol=`rgb(${tR},${tG},${tB})`;
  let dynStyle=document.getElementById("dynYellowStyle");
  if(!dynStyle){dynStyle=document.createElement("style");dynStyle.id="dynYellowStyle";document.head.appendChild(dynStyle);}
  dynStyle.textContent=`
    .slider-wrap input[type=range]::-webkit-slider-runnable-track{background:${trackCol}!important;}
    .slider-wrap input[type=range]::-moz-range-track{background:${trackCol}!important;}
  `;
  document.querySelector(".top-line").style.background=trackCol;
  // Background color
  const bR=Math.round(baseBg[0]*mR);
  const bG=Math.round(baseBg[1]*mG);
  const bB=Math.round(baseBg[2]*mB);
  document.getElementById("root").style.background=`rgb(${bR},${bG},${bB})`;
}

// === RESPONSIVE SIZING ===
function resize(){
  const isPC=window.innerWidth>=600;
  const containerW=isPC?375:window.innerWidth;
  const containerH=isPC?812:window.innerHeight;
  const chassisAspect=CHASSIS_W/CHASSIS_H;
  const cw1=document.getElementById("chassisWrap");
  const maxW=containerW-8;
  const mainCtrl=document.getElementById("mainCtrl");
  const btnBar=document.getElementById("btnBar");
  const topLine=document.querySelector(".top-line");
  const logo=document.getElementById("logoImg");

  // Responsive scale factor (1.0 at 375px, smaller on narrow screens)
  const sf=Math.min(1, containerW/375);
  const root=document.documentElement;
  root.style.setProperty("--thumb-size",Math.round(27*sf)+"px");
  root.style.setProperty("--track-h",Math.round(6*sf)+"px");
  root.style.setProperty("--slider-h",Math.round(40*sf)+"px");

  // Scale UI elements
  document.querySelectorAll(".slider-wrap").forEach(el=>{
    el.style.fontSize=Math.round(18*sf)+"px";
    el.style.padding="0 "+Math.round(30*sf)+"px";
  });
  document.querySelectorAll(".btn").forEach(el=>{
    const sz=Math.round(44*sf);
    el.style.width=sz+"px";
    el.style.height=sz+"px";
  });
  document.querySelectorAll(".btn-en").forEach(el=>{
    el.style.fontSize=Math.round(14*sf)+"px";
  });
  if(btnBar) btnBar.style.gap=Math.round(13*sf)+"px";
  if(logo) logo.style.maxWidth=Math.round(262*sf)+"px";
  const copEl=document.querySelector(".copyright");
  if(copEl) copEl.style.fontSize=Math.round(12*sf)+"px";
  if(topLine){
    topLine.style.height=Math.round(6*sf)+"px";
    topLine.style.marginBottom=Math.round(20*sf)+"px";
  }

  const uiHeight=13
    +(topLine?topLine.offsetHeight:6)+20
    +(logo?logo.offsetHeight:30)+0
    +(mainCtrl?mainCtrl.offsetHeight:140)
    +4
    +(btnBar?btnBar.offsetHeight:60)
    +50;
  const maxH=Math.max(100, containerH-uiHeight);
  let w=maxW, h=maxW/chassisAspect;
  if(h>maxH){h=maxH;w=h*chassisAspect;}
  cw1.style.width=w+"px";
  const scale=w/CHASSIS_W;
  display.style.left=(LCD_X*scale)+"px";
  display.style.top=(LCD_Y*scale)+"px";
  display.style.width=(IW*EX_SC*scale)+"px";
  display.style.height=(IH*EX_SC*scale)+"px";
  const chassisLeft=(containerW-w)/2;
  const pad=chassisLeft+"px";
  document.querySelectorAll(".ctrl-bar").forEach(el=>{
    el.style.maxWidth="none";
    el.style.paddingLeft=pad;
    el.style.paddingRight=pad;
  });
  document.querySelectorAll(".logo").forEach(el=>{
    el.style.marginLeft=chassisLeft+"px";
  });
}
window.addEventListener("resize",resize);
resize();

let _gifReady=false, _gifWorkerUrl=null;
function _initGifOnce(){
  if(_gifReady)return;
  _gifReady=true;
  const b64=GIF_WORKER_B64;
  _gifWorkerUrl=URL.createObjectURL(new Blob([atob(b64)],{type:"application/javascript"}));
}

// === ILLUSION (???) — GB + Real photo GIF ===
function captureIllusion(){
  _initGifOnce();
  const vw=video.videoWidth,vh=video.videoHeight;
  if(!vw)return;
  const vAspect=vw/vh,gAspect=IW/IH;
  let sx=0,sy=0,sw=vw,sh=vh;
  if(vAspect>gAspect){sw=vh*gAspect;sx=(vw-sw)/2;}
  else{sh=vw/gAspect;sy=(vh-sh)/2;}

  const gbW=IW*EX_SC, gbH=IH*EX_SC; // 800x720

  // --- Frame 1 & 3: GB (NORMAL style, no grid) ---
  if(facingMode==="user"){
    wCtx.save();wCtx.translate(IW,0);wCtx.scale(-1,1);
    wCtx.drawImage(video,sx,sy,sw,sh,0,0,IW,IH);
    wCtx.restore();
  }else{
    wCtx.drawImage(video,sx,sy,sw,sh,0,0,IW,IH);
  }
  const raw=wCtx.getImageData(0,0,IW,IH);
  for(let i=0;i<raw.data.length;i+=4){
    const gray=raw.data[i]*0.299+raw.data[i+1]*0.587+raw.data[i+2]*0.114;
    raw.data[i]=gray;raw.data[i+1]=gray;raw.data[i+2]=gray;
  }
  wCtx.putImageData(raw,0,0);
  const qImg=wCtx.getImageData(0,0,IW,IH);
  quantize(qImg,ACTIVE_PAL,false,contrastLevel);
  applyDeadPixels(qImg,deadCols,ACTIVE_PAL,IW,IH);
  wCtx.putImageData(qImg,0,0);
  if(vinegarSev>0){
    const vImg=wCtx.getImageData(0,0,IW,IH);
    VinegarSyndrome.apply(vImg,vinegarSev,IW,IH,deadCols,ACTIVE_PAL,lightMode?0.5:1);
    wCtx.putImageData(vImg,0,0);
  }
  const srcData=wCtx.getImageData(0,0,IW,IH).data;
  const gbCanvas=document.createElement("canvas");
  gbCanvas.width=gbW;gbCanvas.height=gbH;
  const gbCtx=gbCanvas.getContext("2d");
  const dstImg=gbCtx.createImageData(gbW,gbH);
  upscale(srcData,dstImg,IW,IH,gbW,gbH,EX_SC,ACTIVE_PAL,false);
  gbCtx.putImageData(dstImg,0,0);

  // --- Frame 2: Real photo (high-res, same 800x720) ---
  const realCanvas=document.createElement("canvas");
  realCanvas.width=gbW;realCanvas.height=gbH;
  const realCtx=realCanvas.getContext("2d");
  if(facingMode==="user"){
    realCtx.save();realCtx.translate(gbW,0);realCtx.scale(-1,1);
    realCtx.drawImage(video,sx,sy,sw,sh,0,0,gbW,gbH);
    realCtx.restore();
  }else{
    realCtx.drawImage(video,sx,sy,sw,sh,0,0,gbW,gbH);
  }

  // --- Build GIF: GB ⇔ Real with blend transitions ---
  // Create blend frames (50/50 mix)
  const blendCanvas1=document.createElement("canvas");
  blendCanvas1.width=gbW;blendCanvas1.height=gbH;
  const blendCtx1=blendCanvas1.getContext("2d");
  blendCtx1.drawImage(gbCanvas,0,0);
  blendCtx1.globalAlpha=0.5;
  blendCtx1.drawImage(realCanvas,0,0);
  blendCtx1.globalAlpha=1.0;

  const blendCanvas2=document.createElement("canvas");
  blendCanvas2.width=gbW;blendCanvas2.height=gbH;
  const blendCtx2=blendCanvas2.getContext("2d");
  blendCtx2.drawImage(realCanvas,0,0);
  blendCtx2.globalAlpha=0.5;
  blendCtx2.drawImage(gbCanvas,0,0);
  blendCtx2.globalAlpha=1.0;

  const gif=new GIF({
    workers:2,
    quality:10,
    width:gbW,
    height:gbH,
    workerScript:_gifWorkerUrl
  });
  gif.addFrame(gbCanvas,{delay:2000,copy:true});
  gif.addFrame(blendCanvas1,{delay:100,copy:true});
  gif.addFrame(realCanvas,{delay:2000,copy:true});
  gif.addFrame(blendCanvas2,{delay:100,copy:true});

  gif.on("finished",function(blob){
    const url=URL.createObjectURL(blob);
    const link=document.createElement("a");
    link.download="gb_camera_"+Date.now()+"_illusion.gif";
    link.href=url;
    link.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
  });
  gif.render();
}

startCamera();
</script>
</body>
</html>
