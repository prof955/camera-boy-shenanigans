<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CAMERA BOY</title>
<style>
@import url('https://cdn.jsdelivr.net/npm/misaki-gothic@1.0.0/misaki_gothic.css');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000000;font-family:'Misaki Gothic','M PLUS 1p',monospace;
  font-style:italic;-webkit-user-select:none;user-select:none;touch-action:none;}
#root{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:0;overflow:hidden;padding-top:13px;padding-bottom:0;background:#C0BFBB;border-radius:12px 12px 50px 12px;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;}
.top-line{width:100%;height:6px;background:#6C6972;border-radius:0;flex-shrink:0;margin-bottom:20px;}
#chassisWrap{margin-top:0;}
.logo{display:block;margin-top:4px;margin-bottom:10px;align-self:flex-start;}
.ctrl-bar{display:flex;align-items:center;gap:8px;padding:2px 8px;width:100%;max-width:640px;justify-content:center;flex-wrap:wrap;}
.btn{background:#6C6972;color:#ffffff;border:2px solid #5a5860;border-radius:999px;padding:6px 16px;
  font-family:'Misaki Gothic',monospace;font-size:18px;font-weight:bold;font-style:italic;cursor:pointer;white-space:nowrap;}
.btn:active{background:#5a5860;}
.btn-accent{background:#800B46;color:#ffffff;border-color:#600835;}
.btn-accent:active{background:#600835;}
.btn-group{display:flex;flex-direction:column;align-items:center;gap:2px;transform:rotate(-20deg);}
.btn-en{color:#17207D;font-size:12px;font-style:normal;font-weight:bold;font-family:'Misaki Gothic',monospace;margin-top:3px;}
.slider-wrap{display:flex;align-items:center;gap:10px;color:#17207D;font-size:18px;font-weight:bold;font-style:italic;width:100%;padding:0 30px;margin-bottom:-9px;}
.slider-wrap:last-child{margin-bottom:10px;}
.slider-wrap input[type=range]{flex:1;height:40px;-webkit-appearance:none;appearance:none;background:transparent;}
.slider-wrap input[type=range]::-webkit-slider-runnable-track{height:6px;background:#6C6972;border-radius:3px;}
.slider-wrap input[type=range]::-moz-range-track{height:6px;background:#6C6972;border-radius:3px;}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:27px;height:27px;background:#800B46;border-radius:50%;margin-top:-11px;cursor:pointer;}
.slider-wrap input[type=range]::-moz-range-thumb{width:27px;height:27px;background:#800B46;border:none;border-radius:50%;cursor:pointer;}
.slider-wrap input[type=range]::-moz-range-progress{background:#6C6972;}
.slider-label{text-align:left;white-space:nowrap;}
</style>
</head>
<body>
<div id="root">
  <div class="top-line"></div>
  <div id="chassisWrap" style="position:relative;display:inline-block;">
    <img id="chassisImg" src="" alt="" style="width:100%;display:block;">
    <div id="yellowOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;background:#ffcd56;opacity:0;mix-blend-mode:multiply;pointer-events:none;"></div>
    <img id="lightOverlay" src="" alt="" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;z-index:5;">
    <canvas id="display" style="position:absolute;"></canvas>
    <img id="glareImg" src="" alt="" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;">
  </div>
  <img id="logoImg" src="" alt="" class="logo" style="max-width:262px;">
  <div class="ctrl-bar" id="mainCtrl">
    <div class="slider-wrap" style="margin-top:10px;">
      <span class="slider-label">1</span>
      <input type="range" id="gbContrastSlider" min="0" max="100" value="50">
    </div>
    <div class="slider-wrap">
      <span class="slider-label">2</span>
      <input type="range" id="contrastSlider" min="0" max="100" value="50">
    </div>
    <div class="slider-wrap">
      <span class="slider-label">3</span>
      <input type="range" id="deadSlider" min="0" max="100" value="0">
    </div>
    <div class="slider-wrap">
      <span class="slider-label">4</span>
      <input type="range" id="vinegarSlider" min="0" max="100" value="0">
    </div>
  </div>
  <div class="ctrl-bar" id="btnBar" style="margin-top:30px;">
    <div class="btn-group"><button class="btn" id="btnFlip">きりかえ</button><span class="btn-en">CAMERA</span></div>
    <div class="btn-group"><button class="btn btn-accent" id="btnMystery">？？？？</button><span class="btn-en">MYSTERY</span></div>
    <div class="btn-group"><button class="btn btn-accent" id="btnShoot">さつえい</button><span class="btn-en">SHOOT</span></div>
  </div>
  <div class="copyright" style="color:#17207D;font-family:'Misaki Gothic',monospace;font-size:12px;font-weight:bold;font-style:normal;text-align:center;margin-top:50px;padding-bottom:30px;">© KUNIO</div>
</div>
